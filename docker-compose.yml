services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: apkdist-telegram-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:?Set TELEGRAM_API_ID in .env}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:?Set TELEGRAM_API_HASH in .env}
      TELEGRAM_LOCAL: "1"
    command:
      - --api-id=${TELEGRAM_API_ID:?Set TELEGRAM_API_ID in .env}
      - --api-hash=${TELEGRAM_API_HASH:?Set TELEGRAM_API_HASH in .env}
      - --local
      - --http-port=8081
      - --dir=/var/lib/telegram-bot-api
    ports:
      - "8081:8081"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api

volumes:
  telegram-bot-api-data:
